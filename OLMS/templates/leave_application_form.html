{% extends "index.html" %}
{% block title %}Leave Form {% endblock title%}

{% block content %}

<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .container {
      border-radius: 5px;
      background-color: #f2f2f2;
      padding: 20px;
    }

    .container {
      background-image: linear-gradient(#5c7c89, #1f4959);
    }
  </style>
</head>

<body>
  <div class="container">
    <h2>Leave Application Form</h2>
    <form method="POST">
      {% csrf_token %}
      <div class="row mb-3">
        <label for="outdate" class="col-sm-3 col-form-label">OUT DATE :</label>
        <div class="col-sm-9">
          <input type="date" class="form-control" id="outdate" name="outdate" placeholder="outdate">
        </div>
      </div>
      <div class="row mb-3">
        <label for="indate" class="col-sm-3 col-form-label">IN DATE :</label>
        <div class="col-sm-9">
          <input type="date" class="form-control" id="indate" name="indate" placeholder="indate">
        </div>
      </div>
      <div class="row mb-3">
        <label for="attachment" class="col-sm-3 col-form-label">ATTACHMENT :</label>
        <div class="col-sm-9">
          <input type="file" class="form-control" id="attachment" name="attachment" placeholder="choose file">
        </div>
      </div>
      <div class="row mb-3">
        <label for="reason" class="col-sm-3 col-form-label">REASON :</label>
        <div class="col-sm-9">
          <textarea class="form-control" id="reason" name="reason" placeholder="Write your reason"
            style="height:200px"></textarea>
        </div>
      </div>
      <div class="row mb-3">
        <div class="col-sm-9 offset-sm-3">
          <button type="submit" class="btn btn-primary">Submit</button>
        </div>
      </div>
    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>

{% endblock %}
