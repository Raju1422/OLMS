{% extends "index.html" %}

{% block title %}
login
{% endblock %}

{% block content %}
<table border="1">
    <thead>
        <tr>
            <th>Student</th>
            <th>Start Date</th>
            <th>End Date</th>
            <th>Reason</th>
            <th>status</th>
        </tr>
    </thead>
    <tbody>
        {% for leave in leaves %}
        <tr>
            <td>{{ leave.user }}</td>
            <td>{{ leave.start_date }}</td>
            <td>{{ leave.end_date }}</td>
            <td>{{ leave.reason }}</td>
            <td>Pending</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
